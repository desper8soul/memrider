name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # prisma.config.ts requires DATABASE_URL; generate does not connect to the DB.
  DATABASE_URL: postgresql://memrider:memrider@localhost:5432/memrider?schema=public
  NODE_ENV: test
  PORT: '3001'
  CORS_ORIGIN: http://localhost:3000
  EMBEDDING_MODEL_ID: Xenova/all-MiniLM-L6-v2
  EMBEDDING_DIMENSION: '384'
  EMBEDDING_QUANTIZED: 'true'
  AWS_REGION: us-east-1
  BEDROCK_MODEL_ID: amazon.nova-lite-v1:0
  AWS_BEARER_TOKEN_BEDROCK: ci-placeholder-token
  AWS_AUTH_SCHEME_PREFERENCE: httpBearerAuth
  PROMPT_SET_NAME: memory-search
  PROMPT_VERSION: v1
  PROMPTS_DIR: ../../packages/journal/prompt-registry
  RUN_LIVE_EVAL: 'true'
  AUTH_PROVIDER: cognito
  COGNITO_USER_POOL_ID: us-east-1_testpool
  COGNITO_CLIENT_ID: test-client-id

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  eval:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-eval'))
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memrider
          POSTGRES_PASSWORD: memrider
          POSTGRES_DB: memrider
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memrider -d memrider"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Migrate database
        run: pnpm db:deploy

      - name: Seed eval data
        run: pnpm --filter @memrider/api eval:seed

      - name: Sync retrieval fixture
        run: pnpm --filter @memrider/api eval:sync-fixture

      - name: Run evaluation
        run: pnpm eval
